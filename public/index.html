<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫管理スキャン</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f5f5f5; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 12px; border: none; color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card"><a href="/list" class="btn" style="background:#17a2b8; text-decoration:none; text-align:center;">📊 在庫一覧・履歴を見る</a></div>
    <div class="card"><button class="btn" style="background:#007bff;" onclick="startScan()">📷 スキャン開始</button><div id="reader"></div></div>
    <div class="card">
        <input type="text" id="p-name" class="input-field" placeholder="商品名">
        <input type="text" id="p-maker" class="input-field" placeholder="メーカー">
        <input type="number" id="qty" class="input-field" value="1">
        <select id="staff" class="input-field"><option>Shohei</option><option>Sayuri</option></select>
        <button class="btn" style="background:#28a745;" onclick="submit('in')">➕ 入庫</button>
        <button class="btn" style="background:#dc3545;" onclick="submit('out')">➖ 出庫</button>
    </div>
    <script>
        let currentShelf = "", currentProd = "";
        function startScan() {
            new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                if (text.startsWith("LOC-")) currentShelf = text;
                else currentProd = text;
                alert("読み取り完了: " + text);
            });
        }
        function submit(type) {
            fetch('/api/stock', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
                shelfId: currentShelf, productId: currentProd, productName: document.getElementById('p-name').value,
                maker: document.getElementById('p-maker').value, staff: document.getElementById('staff').value,
                quantity: parseInt(document.getElementById('qty').value), type: type
            })}).then(() => alert("登録完了！"));
        }
    </script>
</body>
</html>
